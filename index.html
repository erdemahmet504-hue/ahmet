<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hard Disk Stok Yönetimi</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1e1e24; 
            margin: 0;
            padding: 40px 20px;
            color: #fff; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: #2a2a35; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.3); 
        }
        h1 { 
            text-align: center; 
            color: #00adb5; 
            margin-bottom: 30px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            background: #323242;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td { 
            padding: 15px; 
            text-align: left; 
            border-bottom: 1px solid #444; 
        }
        th { 
            background-color: #00adb5; 
            color: #fff; 
            font-weight: 600;
        }
        tr:hover { 
            background-color: #3d3d52; 
        }
        .badge { 
            background: #3f51b5; 
            color: white; 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 0.85em; 
            font-weight: bold;
        }
        
        /* --- GİZLİLİK AYARI --- */
        /* Başlangıçta arttırma/azaltma butonlarını herkesten gizle */
        .stock-btn { 
            display: none;
            padding: 6px 14px; 
            margin: 0 4px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1em;
            transition: background 0.2s;
        }
        /* Sadece url sonunda şifre olan (body etiketinde is-admin sınıfı olan) kişiye göster */
        body.is-admin .stock-btn {
            display: inline-block;
        }
        
        .btn-plus { background: #2ecc71; color: white; }
        .btn-plus:hover { background: #27ae60; }
        .btn-minus { background: #e74c3c; color: white; }
        .btn-minus:hover { background: #c0392b; }
        
        .warning { 
            color: #ff4a4a; 
            font-weight: bold; 
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Disk Stok Kontrol Paneli</h1>
    <div id="admin-panel" style="background: #23272a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #00adb5;">
    <h3 style="color: #00adb5; margin-top: 0;">Yeni Disk Ekle (Admin Paneli)</h3>
    <form id="add-stock-form" onsubmit="addNewStock(event)" style="display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="text" id="prod-brand" placeholder="Marka (Örn: Samsung)" required style="padding: 8px; border-radius: 4px; border: none;">
        <input type="text" id="prod-model" placeholder="Model (Örn: 980 Pro)" required style="padding: 8px; border-radius: 4px; border: none;">
        <input type="number" id="prod-capacity" placeholder="Boyut (GB)" required style="padding: 8px; border-radius: 4px; border: none;">
        <input type="number" id="prod-stock" placeholder="Başlangıç Stok" required style="padding: 8px; border-radius: 4px; border: none;">
        <button type="submit" style="background: #00adb5; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">Stoka Ekle</button>
    </form>
</div>
    <table>
        <thead>
            <tr>
                <th>Marka</th>
                <th>Model</th>
                <th>Boyut</th>
                <th>Mevcut Stok</th>
                <th>İşlemler</th>
            </tr>
        </thead>
        <tbody id="stockTableBody">
            </tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
