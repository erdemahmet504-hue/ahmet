<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hard Disk Stok Yönetimi</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 20px; }
        h1, h2 { color: #fff; }
        h2 { margin-top: 30px; padding-bottom: 5px; border-bottom: 2px solid #333; }
        .section-healthy { color: #28a745; }
        .section-low { color: #ffc107; }
        .section-defective { color: #dc3545; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background-color: #1e1e1e; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #2d2d2d; }
        .admin-box { background-color: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input, .form-group select { padding: 8px; border-radius: 4px; width: 100%; max-width: 300px; background-color: #2b2b2b; color: white; border: 1px solid #444; }
        .btn-submit { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-action { padding: 5px 10px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-plus { background-color: #28a745; color: white; }
        .btn-minus { background-color: #ffc107; color: black; }
        .btn-delete { background-color: #dc3545; color: white; }
    </style>
</head>
<body>

    <h1>Disk Stok Takip Paneli</h1>

    <div id="admin-panel" class="admin-box" style="display: none;">
        <h2>Yeni Ürün Ekle</h2>
        <form id="add-stock-form" onsubmit="addNewStock(event)">
            <div class="form-group">
                <label>Marka:</label>
                <input type="text" id="prod-brand" required placeholder="Örn: Seagate">
            </div>
            <div class="form-group">
                <label>Model:</label>
                <input type="text" id="prod-model" required placeholder="Örn: Barracuda">
            </div>
            <div class="form-group">
                <label>Kapasite (GB):</label>
                <input type="number" id="prod-capacity" required placeholder="Örn: 1000">
            </div>
            <div class="form-group">
                <label>Stok Adedi:</label>
                <input type="number" id="prod-stock" required placeholder="Örn: 5">
            </div>
            <div class="form-group">
                <label>Disk Durumu:</label>
                <select id="prod-status">
                    <option value="Sağlıklı">Sağlıklı</option>
                    <option value="Sağlığı Düşük">Sağlığı Düşük</option>
                    <option value="Arızalı">Arızalı</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Ürünü Buluta Ekle</button>
        </form>
    </div>

    <h2 class="section-healthy">🟢 Sağlıklı Diskler</h2>
    <table id="table-healthy">
        <thead>
            <tr>
                <th>Marka</th>
                <th>Model</th>
                <th>Boyut</th>
                <th>Mevcut Stok</th>
                <th>İşlemler</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2 class="section-low">🟡 Sağlığı Düşük Diskler</h2>
    <table id="table-low">
        <thead>
            <tr>
                <th>Marka</th>
                <th>Model</th>
                <th>Boyut</th>
                <th>Mevcut Stok</th>
                <th>İşlemler</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2 class="section-defective">🔴 Arızalı Diskler</h2>
    <table id="table-defective">
        <thead>
            <tr>
                <th>Marka</th>
                <th>Model</th>
                <th>Boyut</th>
                <th>Mevcut Stok</th>
                <th>İşlemler</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
